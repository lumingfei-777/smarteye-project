<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAV Detection System</title>

<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface-2: #f2f1ee;
    --border: #e8e6e1;
    --text: #1a1916;
    --text-2: #6b6860;
    --text-3: #b0aea8;
    --accent: #1a1916;
    --green: #2d6a4f;
    --amber: #c77b2e;
    --red: #c0392b;
    --green-bg: #eaf3ee;
    --amber-bg: #fdf4e8;
    --red-bg: #faeaea;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 28px; height: 28px; background: var(--text);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 14px; height: 14px; fill: white; }
  .logo-name { font-family: monospace; font-size: 13px; font-weight: 500; letter-spacing: 0.05em; }

  .header-stats { display: flex; gap: 0; align-items: stretch; }
  .h-stat {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 0 20px; border-left: 1px solid var(--border); min-width: 80px;
  }
  .h-stat-val { font-family: monospace; font-size: 18px; font-weight: 500; line-height: 1; }
  .h-stat-val.green { color: var(--green); }
  .h-stat-val.amber { color: var(--amber); }
  .h-stat-val.red   { color: var(--red); }
  .h-stat-label { font-size: 10px; color: var(--text-3); margin-top: 3px; letter-spacing: 0.04em; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .clock-wrap { text-align: right; }
  .clock { font-family: monospace; font-size: 15px; letter-spacing: 0.05em; }
  .date { font-family: monospace; font-size: 10px; color: var(--text-3); margin-top: 1px; }

  .pill {
    height: 28px; padding: 0 12px; border-radius: 100px;
    font-family: monospace; font-size: 11px; letter-spacing: 0.05em;
    border: 1px solid var(--border); cursor: pointer; background: transparent;
    color: var(--text-2); display: flex; align-items: center; gap: 5px; transition: all 0.15s;
  }
  .pill:hover { background: var(--surface-2); }
  .pill.online { color: var(--green); border-color: #b8dac8; background: var(--green-bg); }
  .pill .dot-sm {
    width: 5px; height: 5px; border-radius: 50%; background: currentColor;
    animation: blink 1.5s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  main {
    flex: 1; display: grid; grid-template-columns: 260px 1fr 280px;
    gap: 1px; background: var(--border); min-height: 0;
  }

  .col { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }

  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-2); }
  .section-badge { font-family: monospace; font-size: 10px; color: var(--text-3); }

  .scroll-body { flex: 1; overflow-y: auto; overflow-x: hidden; min-height: 0; }
  .scroll-body::-webkit-scrollbar { width: 3px; }
  .scroll-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .target-card {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s;
  }
  .target-card:hover { background: var(--surface); }
  .target-card.selected { background: var(--surface); }

  .tc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .tc-id { font-family: monospace; font-size: 12px; font-weight: 500; }
  .tc-badge { font-family: monospace; font-size: 10px; padding: 2px 7px; border-radius: 100px; border: 1px solid; }
  .tc-badge.track   { color: var(--green); border-color: #b8dac8; background: var(--green-bg); }
  .tc-badge.occlude { color: var(--amber); border-color: #e8c98a; background: var(--amber-bg); }

  .tc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .tc-metric label { display: block; font-size: 10px; color: var(--text-3); margin-bottom: 2px; }
  .tc-metric span { font-family: monospace; font-size: 15px; font-weight: 500; }
  .tc-metric span.green { color: var(--green); }
  .tc-metric span.amber { color: var(--amber); }
  .tc-metric span.red   { color: var(--red); }
  .tc-metric span small { font-size: 10px; color: var(--text-3); font-weight: 400; }

  .bar-track { height: 3px; background: var(--border); border-radius: 100px; overflow: hidden; margin-bottom: 6px; }
  .bar-fill { height: 100%; border-radius: 100px; transition: width 0.5s ease; }
  .bar-fill.green { background: var(--green); }
  .bar-fill.amber { background: var(--amber); }
  .bar-fill.red   { background: var(--red); }

  .tc-pos { font-family: monospace; font-size: 10px; color: var(--text-3); }

  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; color: var(--text-3); font-size: 12px; padding: 40px; text-align: center;
  }
  .empty-icon { font-size: 28px; opacity: 0.4; }

  .log-panel { flex-shrink: 0; height: 160px; border-top: 1px solid var(--border); display: flex; flex-direction: column; }
  .log-body { flex: 1; overflow-y: auto; padding: 8px 0; min-height: 0; }
  .log-body::-webkit-scrollbar { width: 3px; }
  .log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .log-item { display: flex; gap: 10px; padding: 3px 16px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:none} }
  .log-ts { font-family: monospace; font-size: 10px; color: var(--text-3); flex-shrink: 0; padding-top: 1px; }
  .log-msg { font-family: monospace; font-size: 11px; color: var(--text-2); line-height: 1.5; }
  .log-msg.ok     { color: var(--green); }
  .log-msg.warn   { color: var(--amber); }
  .log-msg.danger { color: var(--red); }

  .video-wrap {
    flex: 1; position: relative; background: #0d0d0d; min-height: 0; overflow: hidden;
  }
  .video-wrap canvas { width: 100%; height: 100%; display: block; }
  #overlayCanvas { position: absolute; inset: 0; pointer-events: none; }

  .vid-meta {
    position: absolute; font-family: monospace; font-size: 10px;
    color: rgba(255,255,255,0.4); pointer-events: none;
  }
  .vid-meta.tl { top: 12px; left: 14px; }
  .vid-meta.tr { top: 12px; right: 14px; text-align: right; }
  .vid-meta.bl { bottom: 12px; left: 14px; }
  .vid-meta.br { bottom: 12px; right: 14px; text-align: right; }

  /* 离线占位 */
  .offline-placeholder {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    background: #0d0d0d; color: rgba(255,255,255,0.15);
    font-family: monospace; font-size: 12px; pointer-events: none;
  }
  .offline-placeholder .off-icon { font-size: 32px; opacity: 0.3; }
  .offline-placeholder.hidden { display: none; }

  .chart-strip {
    flex-shrink: 0; height: 90px; display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 1px; background: var(--border); border-top: 1px solid var(--border);
  }
  .chart-cell { background: var(--bg); padding: 10px 14px 8px; display: flex; flex-direction: column; }
  .chart-label { font-size: 10px; color: var(--text-3); letter-spacing: 0.04em; flex-shrink: 0; margin-bottom: 4px; }
  .chart-canvas-wrap { flex: 1; min-height: 0; position: relative; }
  .chart-canvas-wrap canvas { width: 100% !important; height: 100% !important; }

  .traj-wrap { flex: 1; min-height: 0; position: relative; background: var(--surface); }
  .traj-wrap canvas { width: 100%; height: 100%; display: block; }

  .sys-bars { flex-shrink: 0; padding: 12px 16px; border-top: 1px solid var(--border); }
  .sys-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .sys-bar-row:last-child { margin-bottom: 0; }
  .sys-bar-name { font-size: 10px; color: var(--text-3); width: 50px; flex-shrink: 0; }
  .sys-bar-track { flex: 1; height: 3px; background: var(--border); border-radius: 100px; overflow: hidden; }
  .sys-bar-fill { height: 100%; border-radius: 100px; background: var(--text); transition: width 0.5s ease; }
  .sys-bar-fill.warn { background: var(--amber); }
  .sys-bar-fill.danger { background: var(--red); }
  .sys-bar-val { font-family: monospace; font-size: 10px; color: var(--text-2); width: 48px; text-align: right; flex-shrink: 0; }

  .radar-wrap { flex-shrink: 0; height: 120px; display: flex; align-items: center; justify-content: center; border-top: 1px solid var(--border); }
  .radar-sweep { animation: radar-rotate 3s linear infinite; transform-origin: 40px 40px; }
  @keyframes radar-rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  footer {
    height: 28px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; background: var(--surface); border-top: 1px solid var(--border);
    flex-shrink: 0; font-family: monospace; font-size: 10px; color: var(--text-3);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16"><path d="M8 1L14 5V11L8 15L2 11V5L8 1Z"/></svg>
    </div>
    <div>
      <span class="logo-name">MAV Detection System</span>
    </div>
  </div>

  <div class="header-stats">
    <div class="h-stat">
      <div class="h-stat-val green" id="statTargets">0</div>
      <div class="h-stat-label">活跃目标</div>
    </div>
    <div class="h-stat">
      <div class="h-stat-val amber" id="statOccluded">0</div>
      <div class="h-stat-label">遮挡目标</div>
    </div>
    <div class="h-stat">
      <div class="h-stat-val" id="statFPS">--</div>
      <div class="h-stat-label">FPS</div>
    </div>
    <div class="h-stat">
      <div class="h-stat-val" id="statMinDist">--</div>
      <div class="h-stat-label">最近距离 (m)</div>
    </div>
  </div>

  <div class="header-right">
    <div class="clock-wrap">
      <div class="clock" id="clockDisplay">--:--:--</div>
      <div class="date" id="dateDisplay">----/--/--</div>
    </div>
    <div class="pill" id="connStatus" onclick="toggleConnection()">
      <span class="dot-sm"></span>
      <span>离线</span>
    </div>
  </div>
</header>

<main>
  <!-- 左栏 -->
  <div class="col">
    <div class="section-head">
      <div class="section-title">目标态势</div>
      <div class="section-badge" id="targetCountBadge">0</div>
    </div>
    <div class="scroll-body" id="targetList" style="flex:1">
      <div class="empty-state">
        <div class="empty-icon">◎</div>
        <div>等待连接服务器</div>
      </div>
    </div>
    <div class="log-panel">
      <div class="section-head" style="flex-shrink:0">
        <div class="section-title">事件日志</div>
        <div class="section-badge" id="logCount">0</div>
      </div>
      <div class="log-body" id="eventLog"></div>
    </div>
  </div>

  <!-- 中栏 -->
  <div class="col">
    <div class="video-wrap">
      <!-- 离线占位层 -->
      <div class="offline-placeholder" id="offlinePlaceholder">
        <div class="off-icon">⬡</div>
        <div>等待视频流</div>
        <div style="font-size:10px;opacity:0.6">连接服务器后自动显示</div>
      </div>
      <canvas id="videoCanvas"></canvas>
      <canvas id="overlayCanvas"></canvas>
      <div class="vid-meta tl">● 实时</div>
      <div class="vid-meta tr" id="ovTR">CAM-01</div>
      <div class="vid-meta bl">KALMAN · BYTETRACK</div>
      <div class="vid-meta br" id="ovBR" style="color:rgba(150,220,170,0.7)">TRACKING</div>
    </div>

    <div class="chart-strip">
      <div class="chart-cell">
        <div class="chart-label">距离 (m)</div>
        <div class="chart-canvas-wrap"><canvas id="chartDist"></canvas></div>
      </div>
      <div class="chart-cell">
        <div class="chart-label">速度 (m/s)</div>
        <div class="chart-canvas-wrap"><canvas id="chartVel"></canvas></div>
      </div>
      <div class="chart-cell">
        <div class="chart-label">目标数量</div>
        <div class="chart-canvas-wrap"><canvas id="chartCount"></canvas></div>
      </div>
    </div>
  </div>

  <!-- 右栏 -->
  <div class="col">
    <div class="section-head">
      <div class="section-title">运动轨迹</div>
      <div class="section-badge">俯视 XZ</div>
    </div>
    <div class="traj-wrap">
      <canvas id="trajCanvas"></canvas>
    </div>

    <div class="section-head" style="border-top:1px solid var(--border)">
      <div class="section-title">系统状态</div>
    </div>
    <div class="sys-bars">
      <div class="sys-bar-row">
        <span class="sys-bar-name">帧率</span>
        <div class="sys-bar-track"><div class="sys-bar-fill" id="barFPS" style="width:0%"></div></div>
        <span class="sys-bar-val" id="envFPS">-- fps</span>
      </div>
      <div class="sys-bar-row">
        <span class="sys-bar-name">检出率</span>
        <div class="sys-bar-track"><div class="sys-bar-fill" id="barDetect" style="width:0%"></div></div>
        <span class="sys-bar-val" id="envDetect">-- %</span>
      </div>
      <div class="sys-bar-row">
        <span class="sys-bar-name">置信度</span>
        <div class="sys-bar-track"><div class="sys-bar-fill" id="barConf" style="width:0%"></div></div>
        <span class="sys-bar-val" id="envConf">-- %</span>
      </div>
      <div class="sys-bar-row">
        <span class="sys-bar-name">延迟</span>
        <div class="sys-bar-track"><div class="sys-bar-fill" id="barLat" style="width:0%"></div></div>
        <span class="sys-bar-val" id="envLat">-- ms</span>
      </div>
      <div class="sys-bar-row">
        <span class="sys-bar-name">帧缓冲</span>
        <div class="sys-bar-track"><div class="sys-bar-fill" id="barBuf" style="width:0%"></div></div>
        <span class="sys-bar-val" id="envBuf">0</span>
      </div>
    </div>

    <div class="radar-wrap">
      <svg id="radarSvg" width="90" height="90" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="37" fill="none" stroke="var(--border)" stroke-width="1"/>
        <circle cx="40" cy="40" r="25" fill="none" stroke="var(--border)" stroke-width="1"/>
        <circle cx="40" cy="40" r="13" fill="none" stroke="var(--border)" stroke-width="1"/>
        <line x1="40" y1="3" x2="40" y2="77" stroke="var(--border)" stroke-width="0.5"/>
        <line x1="3" y1="40" x2="77" y2="40" stroke="var(--border)" stroke-width="0.5"/>
        <g class="radar-sweep">
          <path d="M40,40 L40,3 A37,37 0 0,1 77,40 Z" fill="url(#sweep)" opacity="0.5"/>
        </g>
        <defs>
          <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#1a1916" stop-opacity="0"/>
            <stop offset="100%" stop-color="#1a1916" stop-opacity="0.4"/>
          </linearGradient>
        </defs>
        <g id="radarDots"></g>
        <circle cx="40" cy="40" r="2.5" fill="var(--text)"/>
      </svg>
    </div>
  </div>
</main>

<footer>
  <span id="wsAddr">ws://127.0.0.1:8765</span>
  <span id="frameCounter">FRAME 0000</span>
  <span>MAV Detection System</span>
</footer>

<script>
// ══ STATE ══
const state = {
  connected: false, ws: null,
  targets: {}, frameCount: 0,
  lastFPS: 0,
  // 视频帧队列
  frameQueue: [],
  maxQueueSize: 5,
  lastFrameImg: null,       // 当前显示的帧 (Image对象)
  lastFrameTime: 0,         // 最后收到帧的时间
  streamFPS: 0,             // 实际视频流帧率
  streamFrameCount: 0,
  streamFPSTimer: 0,
  // 图表历史
  histDist:  new Array(80).fill(null),
  histVel:   new Array(80).fill(null),
  histCount: new Array(80).fill(0),
  // 系统状态
  env: { fps:0, detect:0, conf:0, lat:0, buf:0 },
  logs: [], selectedId: null,
  palette: ['#2d6a4f','#c77b2e','#2b5fa8','#8b3a8b','#8b2020'],
  // 分辨率（从帧数据中获取）
  frameWidth: 1280, frameHeight: 720,
};

// ══ 时钟 ══
function updateClock(){
  const n=new Date(), p=v=>String(v).padStart(2,'0');
  document.getElementById('clockDisplay').textContent=`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  document.getElementById('dateDisplay').textContent=`${n.getFullYear()}/${p(n.getMonth()+1)}/${p(n.getDate())}`;
}
setInterval(updateClock,1000); updateClock();

// ══ Canvas 初始化 ══
const videoCanvas = document.getElementById('videoCanvas');
const vCtx = videoCanvas.getContext('2d');
const overlayCanvas = document.getElementById('overlayCanvas');
const oCtx = overlayCanvas.getContext('2d');

function resizeVideoCanvas(){
  const c = videoCanvas.parentElement;
  videoCanvas.width  = c.clientWidth;
  videoCanvas.height = c.clientHeight;
  overlayCanvas.width  = c.clientWidth;
  overlayCanvas.height = c.clientHeight;
}
window.addEventListener('resize', resizeVideoCanvas);
resizeVideoCanvas();

// ══ 视频帧处理 ══

/**
 * 收到帧数据包时调用
 * packet: { message_type:'frame', data:base64_jpeg, width, height, frame_id, timestamp }
 */
function receiveFrame(packet){
  const sendTs = packet.timestamp * 1000; // 转ms
  const now = Date.now();
  const latency = now - sendTs;

  // 更新分辨率
  if(packet.width)  state.frameWidth  = packet.width;
  if(packet.height) state.frameHeight = packet.height;

  // 更新延迟统计
  state.env.lat = latency > 0 && latency < 5000 ? latency : state.env.lat;

  // 队列控制：丢弃过旧的帧防止积压
  if(state.frameQueue.length >= state.maxQueueSize){
    state.frameQueue.shift(); // 丢最旧的
  }

  // 创建Image对象解码
  const img = new Image();
  img.onload = () => {
    state.frameQueue.push(img);
    // 统计流帧率
    state.streamFrameCount++;
    const elapsed = (now - state.streamFPSTimer) / 1000;
    if(elapsed >= 1.0){
      state.streamFPS = state.streamFrameCount / elapsed;
      state.streamFrameCount = 0;
      state.streamFPSTimer = now;
    }
  };
  img.src = 'data:image/jpeg;base64,' + packet.data;
}

function drawVideoFrame(){
  const W = videoCanvas.width, H = videoCanvas.height;

  // 从队列取最新帧
  if(state.frameQueue.length > 0){
    state.lastFrameImg = state.frameQueue.pop(); // 取最新
    state.frameQueue.length = 0;                 // 清空剩余（跳帧）
    state.env.buf = 0;

    // 隐藏离线占位
    document.getElementById('offlinePlaceholder').classList.add('hidden');
  }

  if(state.lastFrameImg){
    // 保持宽高比居中绘制
    const imgW = state.frameWidth, imgH = state.frameHeight;
    const scale = Math.min(W/imgW, H/imgH);
    const dw = imgW*scale, dh = imgH*scale;
    const dx = (W-dw)/2, dy = (H-dh)/2;
    vCtx.fillStyle = '#0d0d0d';
    vCtx.fillRect(0,0,W,H);
    vCtx.drawImage(state.lastFrameImg, dx, dy, dw, dh);
  } else {
    // 无帧时绘制暗背景（占位层已显示）
    vCtx.fillStyle = '#0d0d0d';
    vCtx.fillRect(0,0,W,H);
  }
}

// ══ Overlay 叠加层 ══
function getColor(t){ return state.palette[(t.track_id-1)%state.palette.length]; }
function hexAlpha(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawOverlay(){
  const W=overlayCanvas.width, H=overlayCanvas.height;
  oCtx.clearRect(0,0,W,H);
  if(!state.lastFrameImg) return;

  // 计算实际绘制区域（与drawVideoFrame一致）
  const imgW=state.frameWidth, imgH=state.frameHeight;
  const scale=Math.min(W/imgW,H/imgH);
  const dw=imgW*scale, dh=imgH*scale;
  const ox=(W-dw)/2, oy=(H-dh)/2;

  Object.values(state.targets).forEach(t=>{
    const dist=t.distance||0;
    const col=getColor(t);
    const dc=dist<30?'#c0392b':dist<90?'#c77b2e':col;

    // 轨迹（使用像素坐标归一化值映射到当前绘制区域）
    if(t.trail && t.trail.length>1){
      for(let i=1;i<t.trail.length;i++){
        const a=i/t.trail.length;
        oCtx.strokeStyle=hexAlpha(dc,a*0.6);
        oCtx.lineWidth=1;
        oCtx.beginPath();
        oCtx.moveTo(ox+t.trail[i-1][0]*dw, oy+t.trail[i-1][1]*dh);
        oCtx.lineTo(ox+t.trail[i][0]*dw,   oy+t.trail[i][1]*dh);
        oCtx.stroke();
      }
    }

    // 边界框
    if(t.bbox_2d_norm){
      const [x1n,y1n,x2n,y2n]=t.bbox_2d_norm;
      const x1=ox+x1n*dw, y1=oy+y1n*dh, bw=(x2n-x1n)*dw, bh=(y2n-y1n)*dh;
      oCtx.strokeStyle=dc; oCtx.lineWidth=1;
      oCtx.strokeRect(x1,y1,bw,bh);
      const cs=8; oCtx.lineWidth=2;
      [[x1,y1,1,1],[x1+bw,y1,-1,1],[x1,y1+bh,1,-1],[x1+bw,y1+bh,-1,-1]].forEach(([cx,cy,sx,sy])=>{
        oCtx.beginPath();
        oCtx.moveTo(cx+sx*cs,cy); oCtx.lineTo(cx,cy); oCtx.lineTo(cx,cy+sy*cs);
        oCtx.stroke();
      });
      oCtx.font='10px monospace';
      const label=`#${t.track_id}  ${dist.toFixed(1)}m`;
      const tw=oCtx.measureText(label).width;
      oCtx.fillStyle='rgba(0,0,0,0.6)'; oCtx.fillRect(x1,y1-16,tw+8,14);
      oCtx.fillStyle=dc; oCtx.fillText(label,x1+4,y1-5);
    }

    // 中心点
    if(t.last_center_2d_norm){
      const cx=ox+t.last_center_2d_norm[0]*dw, cy=oy+t.last_center_2d_norm[1]*dh;
      oCtx.fillStyle=dc;
      oCtx.beginPath(); oCtx.arc(cx,cy,2.5,0,Math.PI*2); oCtx.fill();
    }
  });
}

// ══ 轨迹图 ══
const trajCanvas=document.getElementById('trajCanvas');
const tCtx=trajCanvas.getContext('2d');

function drawTrajectory(){
  const p=trajCanvas.parentElement;
  trajCanvas.width=p.clientWidth; trajCanvas.height=p.clientHeight;
  const W=trajCanvas.width, H=trajCanvas.height;
  tCtx.clearRect(0,0,W,H);
  tCtx.fillStyle='var(--surface)'; tCtx.fillRect(0,0,W,H);
  const cx=W/2, cy=H/2, scale=Math.min(W,H)/2/120;
  tCtx.strokeStyle='var(--border)'; tCtx.lineWidth=0.5;
  [30,60,90,120].forEach(r=>{
    tCtx.beginPath(); tCtx.arc(cx,cy,r*scale,0,Math.PI*2); tCtx.stroke();
    tCtx.fillStyle='var(--text-3)'; tCtx.font='8px monospace';
    tCtx.fillText(`${r}m`,cx+r*scale+3,cy-2);
  });
  tCtx.strokeStyle='#e8e6e1';
  tCtx.beginPath(); tCtx.moveTo(0,cy); tCtx.lineTo(W,cy); tCtx.stroke();
  tCtx.beginPath(); tCtx.moveTo(cx,0); tCtx.lineTo(cx,H); tCtx.stroke();
  tCtx.fillStyle='var(--text-3)'; tCtx.font='8px monospace';
  tCtx.fillText('N',cx+3,10); tCtx.fillText('E',W-12,cy-3);

  Object.values(state.targets).forEach(t=>{
    const col=getColor(t), dist=t.distance||0;
    const dc=dist<30?'#c0392b':dist<90?'#c77b2e':col;
    const tr=t.trail3d||[];
    if(tr.length>1){
      for(let i=1;i<tr.length;i++){
        const a=i/tr.length;
        tCtx.strokeStyle=hexAlpha(dc,a*0.7); tCtx.lineWidth=1.5;
        tCtx.beginPath();
        tCtx.moveTo(cx+tr[i-1][0]*scale,cy-tr[i-1][2]*scale);
        tCtx.lineTo(cx+tr[i][0]*scale,  cy-tr[i][2]*scale);
        tCtx.stroke();
      }
    }
    const pos=t.position_3d;
    if(pos){
      const px=cx+pos[0]*scale, py=cy-pos[2]*scale;
      tCtx.fillStyle=dc;
      tCtx.beginPath(); tCtx.arc(px,py,4,0,Math.PI*2); tCtx.fill();
      tCtx.fillStyle='var(--text-2)'; tCtx.font='9px monospace';
      tCtx.fillText(`#${t.track_id}`,px+6,py-4);
    }
  });
  tCtx.fillStyle='var(--text)';
  tCtx.beginPath(); tCtx.arc(cx,cy,4,0,Math.PI*2); tCtx.fill();
}

// ══ 迷你图表 ══
function drawMiniChart(canvas,history,color){
  const ctx=canvas.getContext('2d');
  const p=canvas.parentElement;
  canvas.width=p.clientWidth; canvas.height=p.clientHeight;
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const valid=history.filter(v=>v!==null);
  if(valid.length<2) return;
  const minV=Math.min(...valid), maxV=Math.max(...valid)||1, range=maxV-minV||1;
  ctx.beginPath();
  let first=true;
  history.forEach((v,i)=>{
    if(v===null) return;
    const x=(i/history.length)*W, y=H-((v-minV)/range)*(H-4)-2;
    if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
  });
  ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.stroke();
  const last=valid[valid.length-1];
  ctx.fillStyle=color; ctx.font='bold 10px monospace';
  ctx.textAlign='right'; ctx.fillText(last.toFixed(1),W-2,12); ctx.textAlign='left';
}

// ══ 目标列表 ══
function renderTargetList(){
  const list=document.getElementById('targetList');
  const targets=Object.values(state.targets);
  document.getElementById('targetCountBadge').textContent=targets.length;
  if(!targets.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">◎</div><div>${state.connected?'等待目标进入视野':'等待连接服务器'}</div></div>`;
    return;
  }
  targets.sort((a,b)=>(a.distance||999)-(b.distance||999));
  list.innerHTML=targets.map(t=>{
    const dist=t.distance||0, vel=t.velocity||0, pos=t.position_3d||[0,0,0];
    const conf=(t.confidence*100)||0;
    const cls=dist<30?'red':dist<90?'amber':'green';
    const badgeCls=t.is_occluded?'occlude':'track';
    return `<div class="target-card ${state.selectedId===t.track_id?'selected':''}" onclick="selectTarget(${t.track_id})">
      <div class="tc-head">
        <div class="tc-id">TGT-${String(t.track_id).padStart(3,'0')}</div>
        <div class="tc-badge ${badgeCls}">${t.is_occluded?'遮挡':'跟踪'}</div>
      </div>
      <div class="tc-grid">
        <div class="tc-metric"><label>距离</label><span class="${cls}">${dist.toFixed(1)}<small> m</small></span></div>
        <div class="tc-metric"><label>速度</label><span>${vel.toFixed(1)}<small> m/s</small></span></div>
        <div class="tc-metric"><label>置信度</label><span>${conf.toFixed(0)}<small> %</small></span></div>
        <div class="tc-metric"><label>命中帧</label><span>${t.hits||0}</span></div>
      </div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${Math.min(dist/120*100,100)}%"></div></div>
      <div class="tc-pos">${pos[0].toFixed(1)}, ${pos[1].toFixed(1)}, ${pos[2].toFixed(1)} m</div>
    </div>`;
  }).join('');
}

function selectTarget(id){ state.selectedId=state.selectedId===id?null:id; renderTargetList(); }

// ══ 顶栏统计 ══
function updateHeaderStats(){
  const targets=Object.values(state.targets);
  const active=targets.filter(t=>!t.is_occluded).length;
  const occ=targets.filter(t=>t.is_occluded).length;
  const dists=targets.map(t=>t.distance||999);
  const minD=dists.length?Math.min(...dists):null;
  document.getElementById('statTargets').textContent=active;
  document.getElementById('statOccluded').textContent=occ;
  document.getElementById('statFPS').textContent=state.streamFPS>0?state.streamFPS.toFixed(0):'--';
  const el=document.getElementById('statMinDist');
  el.textContent=minD!==null?minD.toFixed(1):'--';
  el.className='h-stat-val '+(minD!==null?(minD<30?'red':minD<90?'amber':'green'):'');
}

// ══ 系统状态栏 ══
function updateEnvBars(){
  const e=state.env;
  const set=(n,val,max,label,wp,dp)=>{
    const pct=Math.min(val/max*100,100);
    const bar=document.getElementById('bar'+n), txt=document.getElementById('env'+n);
    const cls=pct>dp?'danger':pct>wp?'warn':'';
    if(bar){bar.style.width=pct+'%';bar.className='sys-bar-fill '+cls;}
    if(txt) txt.textContent=label;
  };
  set('FPS',  e.fps||state.streamFPS, 60, `${(e.fps||state.streamFPS).toFixed(1)} fps`, 0, 0);
  set('Detect',e.detect,100,`${e.detect.toFixed(0)} %`,0,0);
  set('Conf',  e.conf,  100,`${e.conf.toFixed(0)} %`,  0,0);
  set('Lat',   e.lat,   300,`${e.lat.toFixed(0)} ms`,  80,150);
  set('Buf',   state.frameQueue.length, state.maxQueueSize, `${state.frameQueue.length}`, 60,80);
}

// ══ 雷达 ══
function updateRadar(){
  const dots=document.getElementById('radarDots'); dots.innerHTML='';
  Object.values(state.targets).forEach(t=>{
    const pos=t.position_3d; if(!pos) return;
    const r=Math.sqrt(pos[0]**2+pos[2]**2); if(r>120) return;
    const angle=Math.atan2(pos[0],pos[2]), pr=r/120*37;
    const px=40+pr*Math.sin(angle), py=40-pr*Math.cos(angle);
    const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',px.toFixed(1)); dot.setAttribute('cy',py.toFixed(1));
    dot.setAttribute('r','2.5'); dot.setAttribute('fill',getColor(t));
    dots.appendChild(dot);
  });
}

// ══ 日志 ══
function addLog(type,msg){
  const n=new Date(), p=v=>String(v).padStart(2,'0');
  const ts=`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  state.logs.unshift({ts,type,msg});
  if(state.logs.length>50) state.logs.pop();
  document.getElementById('eventLog').innerHTML=state.logs.slice(0,20).map(l=>
    `<div class="log-item"><span class="log-ts">${l.ts}</span><span class="log-msg ${l.type}">${l.msg}</span></div>`
  ).join('');
  document.getElementById('logCount').textContent=state.logs.length;
}

// ══ WebSocket ══
function toggleConnection(){ state.connected?disconnect():connectWS(); }

function connectWS(){
  try {
    state.ws = new WebSocket('ws://127.0.0.1:8765');

    state.ws.onopen = () => {
      state.connected = true;
      state.streamFPSTimer = Date.now();
      const el=document.getElementById('connStatus');
      el.className='pill online';
      el.innerHTML='<span class="dot-sm"></span><span>在线</span>';
      addLog('ok','WebSocket 已连接');
    };

    state.ws.onmessage = e => {
      try {
        const data = JSON.parse(e.data);

        if(data.message_type === 'frame'){
          // 视频帧数据包
          receiveFrame(data);

        } else if(data.message_type === 'data'){
          // 无人机检测数据包
          processData(data);

        } else if(data.message_type === 'device_info'){
          addLog('ok', `设备接入: ${data.device_name||data.device_id}`);
        }
      } catch(err) {
        console.warn('消息解析失败:', err);
      }
    };

    state.ws.onclose = () => {
      disconnect();
      addLog('warn','连接已断开');
    };

    state.ws.onerror = () => {
      addLog('danger','连接失败');
      disconnect();
    };

  } catch(e) {
    addLog('danger','WebSocket 初始化失败');
  }
}

function disconnect(){
  if(state.ws){ try{state.ws.close();}catch(e){} state.ws=null; }
  state.connected = false;
  // 清空视频帧
  state.lastFrameImg = null;
  state.frameQueue.length = 0;
  document.getElementById('offlinePlaceholder').classList.remove('hidden');
  const el=document.getElementById('connStatus');
  el.className='pill';
  el.innerHTML='<span class="dot-sm"></span><span>离线</span>';
}

// ══ 数据处理 ══
function processData(data){
  if(!data.readings) return;
  const drones = data.readings.drones || [];

  drones.forEach(d => {
    const id = d.track_id;
    const prev = state.targets[id] || {trail:[], trail3d:[]};

    // 坐标归一化
    if(d.center_2d){
      d.last_center_2d_norm = [d.center_2d[0]/state.frameWidth, d.center_2d[1]/state.frameHeight];
    }
    if(d.bbox_2d){
      d.bbox_2d_norm = [
        d.bbox_2d[0]/state.frameWidth,  d.bbox_2d[1]/state.frameHeight,
        d.bbox_2d[2]/state.frameWidth,  d.bbox_2d[3]/state.frameHeight
      ];
    }

    // 追加轨迹
    if(d.center_2d){
      prev.trail.push([d.center_2d[0]/state.frameWidth, d.center_2d[1]/state.frameHeight]);
      if(prev.trail.length>40) prev.trail.shift();
    }
    if(d.position_3d){
      prev.trail3d.push([...d.position_3d]);
      if(prev.trail3d.length>40) prev.trail3d.shift();
    }
    d.trail  = prev.trail;
    d.trail3d= prev.trail3d;

    if(!state.targets[id]) addLog('ok',`新目标 TGT-${String(id).padStart(3,'0')} 进入视野`);
    state.targets[id] = d;
  });

  // 移除消失目标
  const cur = new Set(drones.map(d=>d.track_id));
  Object.keys(state.targets).forEach(id=>{
    if(!cur.has(parseInt(id))){
      addLog('warn',`TGT-${String(id).padStart(3,'0')} 离开视野`);
      delete state.targets[id];
    }
  });

  // 更新图表历史
  const ds=drones.map(d=>d.distance||0), vs=drones.map(d=>d.velocity||0);
  state.histDist.push(ds.length?Math.min(...ds):null); state.histDist.shift();
  state.histVel.push(vs.length?Math.max(...vs):null);  state.histVel.shift();
  state.histCount.push(drones.length); state.histCount.shift();

  // 更新置信度、检出率
  if(drones.length>0){
    state.env.conf = drones.reduce((a,d)=>a+(d.confidence||0),0)/drones.length*100;
    const active = drones.filter(d=>!d.is_occluded).length;
    state.env.detect = active/drones.length*100;
  }
}

// ══ 渲染主循环 ══
let renderLastTs = performance.now(), frameCounter = 0;

function renderLoop(ts){
  requestAnimationFrame(renderLoop);
  const dt = ts - renderLastTs;
  if(dt < 16) return; // 限制60fps
  state.lastFPS = 1000/dt;
  renderLastTs = ts;
  frameCounter++;

  drawVideoFrame();
  drawOverlay();
  drawTrajectory();

  if(frameCounter % 2 === 0){
    drawMiniChart(document.getElementById('chartDist'),  state.histDist,  '#2d6a4f');
    drawMiniChart(document.getElementById('chartVel'),   state.histVel,   '#c77b2e');
    drawMiniChart(document.getElementById('chartCount'), state.histCount, '#2b5fa8');
  }

  if(frameCounter % 3 === 0){
    renderTargetList();
    updateHeaderStats();
    updateEnvBars();
    updateRadar();
    state.env.fps = state.streamFPS;
    document.getElementById('frameCounter').textContent =
      `FRAME ${String(frameCounter).padStart(4,'0')} · ${dt.toFixed(1)}ms`;
  }
}

requestAnimationFrame(renderLoop);
addLog('ok','系统启动完成');
addLog('ok','点击"离线"按钮连接服务器');
</script>
